# sandbox/docker-compose.yml
#
# Noldarim dev sandbox — full stack in an isolated container.
# Requires Sysbox runtime for secure Docker-in-Docker.
#
# Usage:
#   docker compose up --build
#
# Prerequisites:
#   - Sysbox installed (https://github.com/nestybox/sysbox)
#   - On macOS: Colima/Lima VM with Sysbox runtime

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10

  noldarim-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: noldarim
      POSTGRES_PASSWORD: noldarim
      POSTGRES_DB: noldarim
    volumes:
      - noldarim-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noldarim"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
      - "8233:8233"  # Temporal UI

  noldarim:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile
    runtime: sysbox-runc
    depends_on:
      - temporal
      - noldarim-postgres
    environment:
      NOLDARIM_TEMPORAL_HOST_PORT: "temporal:7233"
      NOLDARIM_TEMPORAL_NAMESPACE: "default"
      NOLDARIM_CONTAINER_RUNTIME_PROVIDER: "local"
      NOLDARIM_CONTAINER_DOCKER_HOST: "unix:///var/run/docker.sock"
      NOLDARIM_SERVER_HOST: "0.0.0.0"
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  noldarim-postgres-data:
